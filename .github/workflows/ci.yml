name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './scripts'
          severity: warning

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate YAML
        run: |
          pip install yamllint
          yamllint -d relaxed tools/ .github/

      - name: Validate JSON
        run: |
          fail=0
          while IFS= read -r f; do
            if python3 -m json.tool "$f" > /dev/null 2>&1; then
              echo "OK   $f"
            else
              echo "FAIL $f"
              fail=1
            fi
          done < <(find . -type f -name '*.json' -not -path './.git/*')
          exit $fail
