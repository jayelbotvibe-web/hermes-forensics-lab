name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './scripts'
          format: tty

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Python lint (ruff)
        run: |
          pip install ruff
          ruff check scripts/ --ignore E501

      - name: Validate encyclopedia generation
        run: |
          pip install pyyaml
          python3 encyclopedia/generate.py
          echo "Encyclopedia markdown is up-to-date with YAML source"

  docker-build:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        tool: [volatility, plaso, mft-tools]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.tool }}
        uses: docker/build-push-action@v5
        with:
          context: tools/${{ matrix.tool }}
          push: false
          load: true
          tags: forensics-${{ matrix.tool }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
